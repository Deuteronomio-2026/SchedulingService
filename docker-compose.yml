version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: scheduling-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: scheduling-rabbitmq
    ports:
      - "5672:5672"   # Puerto para aplicaciones
      - "15672:15672" # Puerto para interfaz web
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  default:
    name: scheduling-network
