name: CD - Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'maven'
        
    - name: Build with Maven
      run: mvn clean package -DskipTests
      
    - name: Build Docker image
      run: |
        docker build -t scheduling-service:latest .
        docker tag scheduling-service:latest scheduling-service:${{ github.sha }}
        
    - name: Log in to Docker Hub (optional)
      if: github.event_name == 'push'
      run: |
        echo "Para habilitar Docker Hub, configura DOCKER_USERNAME y DOCKER_PASSWORD en los secrets"
        # docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}
        # docker push scheduling-service:latest
        
    - name: Deploy notification
      run: |
        echo "Deployment ready! Image: scheduling-service:${{ github.sha }}"
        echo "Configure deployment target (AWS, Azure, GCP, etc.) as needed"
