name: CI - Build and Test

on:
  push:
    branches: [ main, develop, feature/** ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'maven'
        
    - name: Build with Maven
      run: mvn clean compile
      
    - name: Run tests
      run: mvn verify
      env:
        RABBITMQ_URL: ${{ secrets.RABBITMQ_URL }}

    - name: SonarCloud Analysis
      run: mvn sonar:sonar -Dsonar.projectKey=Deuteronomio-2026_SchedulingService -Dsonar.organization=deuteronomio-2026 -Dsonar.host.url=https://sonarcloud.io -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    - name: Package application
      run: mvn package -DskipTests
      
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: scheduling-service-jar
        path: target/*.jar
        retention-days: 7
