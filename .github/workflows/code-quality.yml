name: Code Quality

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  code-analysis:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'maven'
        
    - name: Compile code
      run: mvn clean compile
      
    - name: Run code coverage
      run: mvn verify
      
    - name: Check code style
      run: |
        echo "Add checkstyle or spotbugs plugin to pom.xml for code analysis"
        # mvn checkstyle:check
